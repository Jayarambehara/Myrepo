<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Booking UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>🎬 Classic Movie Booking</h1>

    <!-- Movie Select -->
    <div class="box">
      <label>Select Movie</label>
      <select id="movie">
        <option>Interstellar</option>
        <option>Inception</option>
        <option>RRR</option>
        <option>Avatar</option>
      </select>
    </div>

    <!-- Theatre Select -->
    <div class="box">
      <label>Select Theatre</label>
      <select id="theatre">
        <option>Sri Rama Theatre</option>
        <option>INOX</option>
        <option>PVR Cinemas</option>
        <option>Cinepolis</option>
      </select>
    </div>

    <!-- Seats -->
    <h3>Select Seats</h3>
    <div class="seats">
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
      <div class="seat"></div>
    </div>

    <button onclick="bookNow()">Book Ticket</button>

    <p id="result"></p>

  </div>

  <script src="script.js"></script>
</body>
</html>
