<!DOCTYPE html>
<html>
<head>
    <title>Rapido Bike Booking</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff7e6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #ffcc00;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #ffcc00;
            color: black;
            border: none;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #e6b800;
        }

        #result {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏍️ Rapido Bike Booking</h1>

    <label>Passenger Name</label>
    <input type="text" id="name">

    <label>Pickup Location</label>
    <input type="text" id="pickup">

    <label>Drop Location</label>
    <input type="text" id="drop">

    <label>Ride Type</label>
    <select id="type">
        <option>Bike</option>
        <option>Bike Plus</option>
        <option>Parcel Delivery</option>
    </select>

    <label>Date</label>
    <input type="date" id="date">

    <button onclick="bookRide()">Book Ride</button>

    <div id="result"></div>
</div>

<script>
function bookRide() {

    let name = document.getElementById("name").value;
    let pickup = document.getElementById("pickup").value;
    let drop = document.getElementById("drop").value;
    let type = document.getElementById("type").value;
    let date = document.getElementById("date").value;

    let rideId = "RPD" + Math.floor(Math.random() * 1000000);
    let fare = Math.floor(Math.random() * 200) + 30;

    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerHTML = `
        <h2>🏍️ Ride Confirmed</h2>
        <p><b>Ride ID:</b> ${rideId}</p>
        <p><b>Name:</b> ${name}</p>
        <p><b>Pickup:</b> ${pickup}</p>
        <p><b>Drop:</b> ${drop}</p>
        <p><b>Ride Type:</b> ${type}</p>
        <p><b>Date:</b> ${date}</p>
        <p><b>Estimated Fare:</b> ₹${fare}</p>
    `;
}
</script>

</body>
</html>
