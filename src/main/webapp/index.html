<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Booking Portal</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

.header{
    background:#0077b6;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    margin:auto;
    margin-top:30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

.card h2{
    margin-bottom:15px;
}

.card a{
    text-decoration:none;
}

.btn{
    background:#0077b6;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

.btn:hover{
    background:#023e8a;
}
</style>
</head>

<body>

<div class="header">
    <h1>✈️ Travel Booking Portal</h1>
    <p>Book Flights, Trains, Buses and Cabs</p>
</div>

<div class="container">

<div class="cards">

<div class="card">
<h2>🚕 Uber</h2>
<a href="uber.html"><button class="btn">Open</button></a>
</div>

<div class="card">
<h2>🚖 Ola</h2>
<a href="ola.html"><button class="btn">Open</button></a>
</div>

<div class="card">
<h2>🏍️ Rapido</h2>
<a href="rapido.html"><button class="btn">Open</button></a>
</div>

<div class="card">
<h2>🚌 Bus Booking</h2>
<a href="bus.html"><button class="btn">Open</button></a>
</div>

<div class="card">
<h2>🎫 RedBus</h2>
<a href="redbus.html"><button class="btn">Open</button></a>
</div>

<div class="card">
<h2>🚆 Train Booking</h2>
<a href="train.html"><button class="btn">Open</button></a>
</div>

<div class="card">
<h2>🚄 RailOne</h2>
<a href="railone.html"><button class="btn">Open</button></a>
</div>

<div class="card">
<h2>✈️ Flight Booking</h2>
<a href="flight.html"><button class="btn">Open</button></a>
</div>

</div>

</div>

</body>
</html>
